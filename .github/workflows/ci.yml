name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Build application images
        run: docker compose build --pull

      - name: Run backend tests in Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            mcr.microsoft.com/dotnet/sdk:9.0 \
            bash -lc '
              set -euo pipefail
              test_projects="$(find src/services -name "*.Tests.csproj" -print)"

              if [ -z "$test_projects" ]; then
                echo "No backend test projects found."
                exit 0
              fi

              find src/services -name "*.Tests.csproj" -print0 \
                | xargs -0 -I {} dotnet test "{}" --configuration Release --verbosity normal
            '
