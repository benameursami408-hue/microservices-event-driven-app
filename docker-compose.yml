services:
  api-gateway:
    build:
      context: ./src
      dockerfile: gateway/ApiGateway/Dockerfile
    container_name: api-gateway
    ports:
      - "127.0.0.1:5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      auth-service:
        condition: service_healthy
      reclamation-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: on-failure

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: sqlserver
    ports:
      - "127.0.0.1:14333:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
      - MSSQL_SA_PASSWORD=${SA_PASSWORD:-PfeNet!2026Strong}
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "127.0.0.1:5672:5672"   # RabbitMQ messaging port
      - "127.0.0.1:15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-pfe}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-PfeNetRabbit!2026}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  auth-service:
    build:
      context: ./src
      dockerfile: services/AuthService/AuthService.Api/Dockerfile
    container_name: auth-service
    ports:
      - "127.0.0.1:5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Database__AutoMigrate=true
      - ConnectionStrings__DBConnection=Server=sqlserver;Database=AuthDB;User Id=sa;Password=${SA_PASSWORD:-PfeNet!2026Strong};TrustServerCertificate=True;Encrypt=False
      - Jwt__Issuer=${JWT_ISSUER:-AuthService}
      - Jwt__Audience=${JWT_AUDIENCE:-AuthServiceUsers}
      - Jwt__SecretKey=${JWT_SECRET:-azertyuiopqsdfghjklmwxcvbn}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-pfe}
      - RabbitMQ__Password=${RABBITMQ_PASS:-PfeNetRabbit!2026}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: on-failure

  reclamation-service:
    build:
      context: ./src
      dockerfile: services/ReclamationService/ReclamationService.Api/Dockerfile
    container_name: reclamation-service
    ports:
      - "127.0.0.1:5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Database__AutoMigrate=true
      - ConnectionStrings__DBConnection=Server=sqlserver;Database=ReclamationDB;User Id=sa;Password=${SA_PASSWORD:-PfeNet!2026Strong};TrustServerCertificate=True;Encrypt=False
      - Jwt__Issuer=${JWT_ISSUER:-AuthService}
      - Jwt__Audience=${JWT_AUDIENCE:-AuthServiceUsers}
      - Jwt__SecretKey=${JWT_SECRET:-azertyuiopqsdfghjklmwxcvbn}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-pfe}
      - RabbitMQ__Password=${RABBITMQ_PASS:-PfeNetRabbit!2026}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: on-failure

  notification-service:
    build:
      context: ./src
      dockerfile: services/NotificationService/NotificationService.Api/Dockerfile
    container_name: notification-service
    ports:
      - "127.0.0.1:5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Database__AutoMigrate=true
      - ConnectionStrings__DBConnection=Server=sqlserver;Database=NotificationDB;User Id=sa;Password=${SA_PASSWORD:-PfeNet!2026Strong};TrustServerCertificate=True;Encrypt=False
      - Notifications__AdminEmail=${NOTIFICATIONS_ADMIN_EMAIL:-admin@local}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-pfe}
      - RabbitMQ__Password=${RABBITMQ_PASS:-PfeNetRabbit!2026}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: on-failure

volumes:
  sqlserver-data:
  rabbitmq-data:
