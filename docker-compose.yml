services:
  api-gateway:
    build:
      context: ./src
      dockerfile: gateway/ApiGateway/Dockerfile
    ports:
      - "127.0.0.1:${GATEWAY_HTTP_PORT:-5005}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      auth-service:
        condition: service_healthy
      reclamation-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      intervention-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: on-failure

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    ports:
      - "127.0.0.1:14333:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
      - MSSQL_SA_PASSWORD=${SA_PASSWORD:-ChangeMe_SqlServer_2026!}
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "127.0.0.1:5672:5672"   # RabbitMQ messaging port
      - "127.0.0.1:15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-pfe}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-ChangeMe_RabbitMQ_2026!}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  auth-service:
    build:
      context: ./src
      dockerfile: services/AuthService/AuthService.Api/Dockerfile
    ports:
      - "127.0.0.1:5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Database__AutoMigrate=true
      - ConnectionStrings__DBConnection=Server=sqlserver;Database=AuthDB;User Id=sa;Password=${SA_PASSWORD:-ChangeMe_SqlServer_2026!};TrustServerCertificate=True;Encrypt=False
      - Jwt__Issuer=${JWT_ISSUER:-AuthService}
      - Jwt__Audience=${JWT_AUDIENCE:-AuthServiceUsers}
      - Jwt__SecretKey=${JWT_SECRET:-ChangeMe_Use_A_Random_At_Least_32_Char_Jwt_Secret_2026!}
      - Seed__Enabled=${SEED_ENABLED:-true}
      - Seed__AdminEmail=${SEED_ADMIN_EMAIL:-admin@local}
      - Seed__AdminPassword=${SEED_ADMIN_PASSWORD:-ChangeMe_Admin_2026!}
      - Seed__AdminFirstName=${SEED_ADMIN_FIRSTNAME:-Admin}
      - Seed__AdminLastName=${SEED_ADMIN_LASTNAME:-User}
      - Seed__AdminPhoneNumber=${SEED_ADMIN_PHONE:-0000000000}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-pfe}
      - RabbitMQ__Password=${RABBITMQ_PASS:-ChangeMe_RabbitMQ_2026!}
      - Security__AuthRateLimit__PermitLimit=${AUTH_RATE_LIMIT_PER_MINUTE:-10}
      - Security__AuthRateLimit__WindowSeconds=60
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: on-failure

  reclamation-service:
    build:
      context: ./src
      dockerfile: services/ReclamationService/ReclamationService.Api/Dockerfile
    ports:
      - "127.0.0.1:5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Database__AutoMigrate=true
      - ConnectionStrings__DBConnection=Server=sqlserver;Database=ReclamationDB;User Id=sa;Password=${SA_PASSWORD:-ChangeMe_SqlServer_2026!};TrustServerCertificate=True;Encrypt=False
      - Jwt__Issuer=${JWT_ISSUER:-AuthService}
      - Jwt__Audience=${JWT_AUDIENCE:-AuthServiceUsers}
      - Jwt__SecretKey=${JWT_SECRET:-ChangeMe_Use_A_Random_At_Least_32_Char_Jwt_Secret_2026!}
      - Seed__Enabled=${SEED_ENABLED:-true}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-pfe}
      - RabbitMQ__Password=${RABBITMQ_PASS:-ChangeMe_RabbitMQ_2026!}
      - Security__UploadRateLimit__PermitLimit=${UPLOAD_RATE_LIMIT_PER_MINUTE:-20}
      - Security__UploadRateLimit__WindowSeconds=60
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: on-failure

  notification-service:
    build:
      context: ./src
      dockerfile: services/NotificationService/NotificationService.Api/Dockerfile
    ports:
      - "127.0.0.1:5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Database__AutoMigrate=true
      - ConnectionStrings__DBConnection=Server=sqlserver;Database=NotificationDB;User Id=sa;Password=${SA_PASSWORD:-ChangeMe_SqlServer_2026!};TrustServerCertificate=True;Encrypt=False
      - Notifications__AdminEmail=${NOTIFICATIONS_ADMIN_EMAIL:-admin@local}
      - Jwt__Issuer=${JWT_ISSUER:-AuthService}
      - Jwt__Audience=${JWT_AUDIENCE:-AuthServiceUsers}
      - Jwt__SecretKey=${JWT_SECRET:-ChangeMe_Use_A_Random_At_Least_32_Char_Jwt_Secret_2026!}
      - Seed__Enabled=${SEED_ENABLED:-true}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-pfe}
      - RabbitMQ__Password=${RABBITMQ_PASS:-ChangeMe_RabbitMQ_2026!}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: on-failure

  intervention-service:
    build:
      context: ./src
      dockerfile: services/InterventionService/InterventionService.Api/Dockerfile
    ports:
      - "127.0.0.1:5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Database__AutoMigrate=true
      - ConnectionStrings__DBConnection=Server=sqlserver;Database=InterventionDB;User Id=sa;Password=${SA_PASSWORD:-ChangeMe_SqlServer_2026!};TrustServerCertificate=True;Encrypt=False
      - Jwt__Issuer=${JWT_ISSUER:-AuthService}
      - Jwt__Audience=${JWT_AUDIENCE:-AuthServiceUsers}
      - Jwt__SecretKey=${JWT_SECRET:-ChangeMe_Use_A_Random_At_Least_32_Char_Jwt_Secret_2026!}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER:-pfe}
      - RabbitMQ__Password=${RABBITMQ_PASS:-ChangeMe_RabbitMQ_2026!}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: on-failure

volumes:
  sqlserver-data:
  rabbitmq-data:
