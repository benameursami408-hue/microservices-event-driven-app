# Optional frontend manifest.
# Use it only if you build a frontend Docker image named sav-frontend:local.
# If your React app is still run with npm run dev, skip this file and run the frontend locally on port 5173.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sav-pro
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sav-pro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: sav-frontend:local
          imagePullPolicy: Always
          ports:
            - containerPort: 80
